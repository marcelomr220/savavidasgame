<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          const originalFetch = window.fetch;
          // Try to redefine the property to be writable
          Object.defineProperty(window, 'fetch', {
            value: originalFetch,
            writable: true,
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Standard fetch workaround failed, trying fallback:', e);
          try {
            // Fallback: delete and re-assign if possible
            const currentFetch = window.fetch;
            delete window.fetch;
            window.fetch = currentFetch;
          } catch (e2) {
            console.error('All fetch workarounds failed:', e2);
          }
        }
        
        // Additional protection against libraries that try to overwrite fetch
        const originalDefineProperty = Object.defineProperty;
        Object.defineProperty = function(obj, prop, descriptor) {
          if (obj === window && prop === 'fetch') {
            console.warn('Prevented library from making fetch read-only');
            return originalDefineProperty(obj, prop, {
              ...descriptor,
              writable: true,
              configurable: true
            });
          }
          return originalDefineProperty.apply(this, arguments);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
